services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spafurniture
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/spafurniture?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change-me-to-a-secure-random-string-at-least-32-chars}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/public/uploads
    depends_on:
      - db
    volumes:
      - uploads:/app/public/uploads

volumes:
  postgres_data:
  uploads:
